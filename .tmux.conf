# Remap prefix key to Ctrl+a
unbind C-a
set -g prefix C-a
bind C-a send-prefix

# Enable mouse
set -g mouse on

# Make windows & panes 1-indexed
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows after closing
set -g renumber-windows on

# Remap Split commands
bind-key "\\" split-window -h -c "#{pane_current_path}"
bind-key "|" split-window -fh -c "#{pane_current_path}"

bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"

# Move window to the left of right
bind-key -r "<" swap-window -d -t -1
bind-key -r ">" swap-window -d -t +1

# Toggling windows & sessions
bind-key "s" last-window
bind-key C-a switch-client -l

# Breaking & joining panes
# Breaking Pane Default: Prefix + !
bind-key j choose-window 'join-pane -h -s "%%"'
bind-key J choose-window 'join-pane -s "%%"'

# Enable vi mode
set-window-option -g mode-keys vi

# copy mode helper mappings
bind-key "/" copy-mode \; command-prompt -T search -p "(search up)" { send-keys -X search-backward "%%" }
bind-key "[" copy-mode \; send-keys -X back-to-indentation
bind-key "]" copy-mode \; send-keys -X back-to-indentation

# Ctrl+c matches vim instead of exiting mode
bind-key -T copy-mode-vi 'C-c' send-keys -X clear-selection

# Rectangle copy similar to vim
bind-key -T copy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
set -g mode-style "fg=black,bg=#87a0be"


# Move pane to current window with selection
bind-key H choose-window 'join-pane -v -s "%%"'
bind-key V choose-window 'join-pane -h -s "%%"'

# Move window to current session with selection
bind-key M choose-window 'move-window -s "%%"'

# Create new session & window with name
bind-key c command-prompt -p "New session:" 'new-session -c "$HOME" -A -s "%%"'
bind-key t command-prompt -p "New window:" 'new-window -c "#{pane_current_path}" -n "%%"'

# Create new window with name

# PLUGINS
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'
# set -g @plugin 'jimeh/tmux-themepack'

# Set tmux theme
# set -g @plugin 'nordtheme/tmux'
# set -g @themepack 'powerline/default/blue'

# Save pane contents when saving tmux session data
set -g @resurrect-capture-pane-contents 'on'
# Restore vim sessions for tmux resurrect
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'
# Last saved environment is automatically restored
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'

# Resize panes shortcuts
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-h resize-pane -L 5
bind-key -r C-l resize-pane -R 5

# tmux status bar
# set -g status-bg brightred
set -g status-left-length 20

