[env]
TERM = "xterm-256color"

[window]
decorations = "None"
option_as_alt = "Both"
# padding = {x = 5, y = 32}
# padding = {x = 5, y = 5}

# opacity = 0.7
# blur = true
# startup_mode = "SimpleFullscreen"
startup_mode = "Maximized"

[general]
import = [
    # "~/.config/alacritty/themes/themes/tausif_kanagawa_dark_theme.toml"
    # "~/.config/alacritty/themes/themes/github_dark_high_contrast.toml" # -- NOT USED
    # "~/.config/alacritty/themes/themes/github_dark_high_contrast_soft.toml" -- NOT USED
    # "~/.config/alacritty/themes/themes/github_dark_high_contrast_alacritty_background.toml" # -- NOT USED
    # "~/.config/alacritty/themes/themes/github_dark_high_contrast_hard.toml"
    # "~/.config/alacritty/themes/themes/tausif_light_theme_soft.toml" -- NOT USED
    "~/.config/alacritty/themes/themes/tausif_light_theme.toml"
    # "~/.config/alacritty/themes/themes/github_light_high_contrast.toml"
    # "~/.config/alacritty/themes/themes/tausif_dark_theme.toml"-- NOT USED
    # "~/.config/alacritty/themes/themes/gruvbox_dark.toml" -- NOT USED
]

[font]
# normal = { family = "MonaspiceNe Nerd Font Mono", style = "Regular" }
normal = { family = "Hack Nerd Font Mono", style = "Regular" }
size = 11.75

[cursor]
style = { blinking = "Always" }
blink_interval = 600
blink_timeout = 0
