#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Tausif Rahman"
email = "tausif.rahman@datadoghq.com"

[signing]
behavior = "own"
backend = "ssh"
key = "~/.ssh/id_ed25519.pub"

[signing.ssh]
key-path = "/home/bits/.ssh/id_ed25519"

[git]
push-new-bookmark = true

[remotes.origin]
auto-track-bookmarks = '''
"prod" |
"main" |
"master" |
"preprod" |
"tausman/*" |
"aaa/authenticator_staging" |
"aaa/terminator_staging"
'''

# Accordion-style log: expands around current position, collapses elsewhere
# [revsets]
# log = "@ | bases | mybookmarks | curbookmark::@ | @::nextbookmark | downstream(@, bookmarksandheads)"
#
# [revset-aliases]
# # Base branches to always show (add 'main' if needed: 'trunk() | main')
# 'bases' = 'trunk() | main'
# # Commits in y that are descendants of x
# 'downstream(x,y)' = '(x::y) & y'
# # My bookmarks that descend from trunk
# 'mybookmarks' = 'downstream(trunk(), bookmarks()) & mine()'
# # Bookmarks + head commits I own
# 'bookmarksandheads' = 'mybookmarks | (heads(trunk()::) & mine())'
# # Most recent bookmark before current position
# 'curbookmark' = 'latest(mybookmarks::@- & mybookmarks)'
# # First bookmark or head after current position
# 'nextbookmark' = 'roots(@:: & bookmarksandheads)'

[aliases]
track-remote = ["util", "exec", "--", "bash", "-c", "git fetch-branch \"$1\" && jj bookmark track \"$1\" --remote=origin", "--"]
review = ["util", "exec", "--", "bash", "-c", """
    set -e
    branch=\"$1\"
    echo \"Tracking remote branch: $branch\"
    jj track-remote \"$branch\"
    echo \"Fetching trunk...\"
    trunk_branch=$(jj log -r 'trunk()' --no-graph -T 'bookmarks' 2>/dev/null | tr -d '*\n' | cut -d'@' -f1)
    if [ -n \"$trunk_branch\" ]; then
        jj git fetch --remote origin --branch \"$trunk_branch\"
    else
        echo \"Warning: Could not determine trunk branch, fetching main/master/trunk\"
        jj git fetch --remote origin --branch main --branch master --branch trunk 2>/dev/null || true
    fi
    echo \"Finding common ancestor and creating new commit...\"
    jj new \"latest(ancestors($branch) & ancestors(trunk()))\"
    echo \"Restoring files from $branch...\"
    jj restore --from \"$branch\"
    echo \"Forgetting remote branch reference...\"
    git forget-branch \"$branch\"
    echo \"Review setup complete!\"
""", "--"]
