# Remap prefix key to Ctrl+a
unbind C-a
set -g prefix C-a
bind C-a send-prefix

# Enable mouse
set -g mouse on
set -g default-terminal "xterm-256color"
# Needed so that cursor does not go invisible due to problem with
#   Alacritty + tmux + zsh VI_MODE_SET_CURSOR=true
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Make windows & panes 1-indexed
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows after closing
set -g renumber-windows on

# Enable clipboard -- loosely following: https://github.com/samoshkin/tmux-config/blob/master/tmux/tmux.conf
set -g set-clipboard on
set -g @copy_use_osc52_fallback on


# Remap Split commands
bind-key "\\" split-window -h -c "#{pane_current_path}"
bind-key "|" split-window -fh -c "#{pane_current_path}"

bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"

# Move window to the left of right
bind-key -r "<" swap-window -d -t -1
bind-key -r ">" swap-window -d -t +1

# Toggling windows & sessions
bind-key "s" last-window
bind-key C-s last-window
bind-key C-a switch-client -l
bind-key C-w run-shell 'tmux neww tmux-sessionizer'

# select windows without needing to leave the home row
bind-key -r j select-window -t 1
bind-key k run-shell 'tmux neww tmux-sessionizer -k'
bind-key -r l select-window -t 3

# select windows without needing to leave the home row
bind-key -r J attach-session -t 0
bind-key -r K attach-session -t 1
bind-key -r L attach-session -t 2

# Use commands from the tmux-sessionizer config
# bind-key -r J run-shell "/Users/tausif.rahman/.local/bin/tmux-sessionizer -s 0"
# bind-key -r K run-shell "/Users/tausif.rahman/.local/bin/tmux-sessionizer -s 1"
# bind-key -r L run-shell "/Users/tausif.rahman/.local/bin/tmux-sessionizer -s 2"

# Remapping choose-window & choose-session
# bind-key w choose-session
bind-key w run-shell 'tmux neww tmux-sessionizer'
bind-key W choose-window

# Enable vi mode
set-window-option -g mode-keys vi

# copy mode helper mappings
bind-key "?" copy-mode \; command-prompt -T search -p "(search up)" { send-keys -X search-backward "%%" }
bind-key "/" copy-mode \; command-prompt -T search -p "(search up)" { send-keys -X search-backward "%%" }
bind-key "[" copy-mode
bind-key "]" copy-mode \; send-keys -X back-to-indentation
bind-key "v" copy-mode
bind-key C-v copy-mode \; send-keys -X back-to-indentation
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"

# Ctrl+c matches vim instead of exiting mode
bind-key -T copy-mode-vi 'C-c' send-keys -X clear-selection

# Rectangle copy similar to vim
bind-key -T copy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'Y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
set -g mode-style "fg=black,bg=#87a0be"


# Move pane to current window with selection
bind-key H choose-window 'join-pane -v -s "%%"'
bind-key V choose-window 'join-pane -h -s "%%"'

# Move window to current session with selection
bind-key M choose-window 'move-window -s "%%"'

# Create new session & window with name
bind-key c command-prompt -p "New session:" 'new-session -c "$HOME" -A -s "%%"'
bind-key t command-prompt -p "New window:" 'new-window -c "#{pane_current_path}" -n "%%"'

# Bootstrap session with standard windows: nvim, testing, claude, jj
bind-key C confirm-before -p "Create workspace windows? (kills existing) [y/n]" \
    "run-shell 'tmux-bootstrap-session'"

# PLUGINS
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'
# set -g @plugin 'jimeh/tmux-themepack'

# Set tmux theme
# set -g @plugin 'nordtheme/tmux'
# set -g @themepack 'powerline/default/blue'

# Save pane contents when saving tmux session data
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save "S"
set -g @resurrect-restore "R"
# Restore vim sessions for tmux resurrect
# set -g @resurrect-strategy-nvim 'session'
# set -g @resurrect-strategy-vim 'session'
# Last saved environment is automatically restored
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'

# Resize panes shortcuts
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-h resize-pane -L 5
bind-key -r C-l resize-pane -R 5

# tmux status bar
# set -g status-bg brightred
# set -g status-bg green
set -g status-left-length 50

# Set pane title
set -g pane-border-status off
# set -g pane-border-status top
# set -g pane-border-format "#{pane_index} #{pane_title}"

# Toggle named panes in/out of window 1
bind-key C-c run-shell 'tmux-toggle-pane claude'
bind-key C-t run-shell 'tmux-toggle-pane testing'
bind-key C-r run-shell 'tmux-toggle-pane jj'

# *** leader key toggle pulled from: https://github.com/samoshkin/tmux-config/blob/95efd543846a27cd2127496b74fd4f4da94f4a31/tmux/tmux.conf#L358-L381 ***
# We want to have single prefix key "C-a", usable both for local and remote session
# we don't want to "C-a" + "a" approach either
# Idea is to turn off all key bindings and prefix handling on local session,
# so that all keystrokes are passed to inner/remote session

# see: toggle on/off all keybindings · Issue #237 · tmux/tmux - https://github.com/tmux/tmux/issues/237

# Also, change some visual styles when window keys are off
bind -T root M-a  \
    set prefix None \;\
    set key-table off \;\
    set status-bg grey \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S \;\

bind -T off M-a \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-bg \;\
  refresh-client -S

